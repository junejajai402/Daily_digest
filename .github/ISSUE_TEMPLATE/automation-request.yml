name: Automation request
description: Structured issue template for the issue-listener agent workflow
title: "[Automation] "
labels:
  - automation:ready
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What needs to be improved or fixed?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should be true once this is done?
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
      description: List the specific conditions the PR should satisfy.
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - low
        - medium
        - high
    validations:
      required: true
